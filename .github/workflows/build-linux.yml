name: Build Linux x64

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    container:
      image: ubuntu:22.04
      options: --user root

    steps:
      - name: Install git and dependencies
        run: |
          apt-get update
          apt-get install -y \
            git \
            build-essential \
            cmake \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-declarative-dev \
            libqt6svg6-dev \
            qt6-multimedia-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            qt6-l10n-tools \
            libqt6opengl6-dev \
            libqt6core5compat6-dev \
            libgl1-mesa-dev \
            libssl-dev \
            zlib1g-dev \
            libx11-dev \
            libomp-dev \
            pkg-config \
            lcov \
            rpm

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build QuaZip from source
        run: |
          git clone --depth 1 --branch v1.4 https://github.com/stachenov/quazip.git /tmp/quazip-src
          cmake -S /tmp/quazip-src -B /tmp/quazip-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DQUAZIP_QT_MAJOR_VERSION=6 \
            -DBUILD_SHARED_LIBS=ON \
            -DQUAZIP_BZIP2=OFF
          cmake --build /tmp/quazip-build -j$(nproc)
          cmake --install /tmp/quazip-build
          ldconfig

      - name: Generate git version header
        run: |
          echo "#define GIT_COMMIT \"$(git rev-parse --short HEAD)\"" > src/core/git_version.h

      - name: Run qmake
        run: |
          mkdir -p build/linux/release/moc build/linux/release/objects build/linux/release/rcc build/linux/release/ui build/linux/release/product
          qmake6 Sankore_3.1.pro CONFIG+=no_webengine "QMAKE_CXXFLAGS+=--coverage" "QMAKE_LFLAGS+=--coverage"

      - name: Build
        run: |
          make -j$(nproc)

      - name: List build output
        if: always()
        run: |
          find build -name "Open-Sankore*" 2>/dev/null || echo "No output found"
          ls -la build/linux/release/product/ 2>/dev/null || echo "Product dir not found"

      - name: Smoke test (app coverage)
        continue-on-error: true
        run: |
          export QT_QPA_PLATFORM=offscreen
          export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
          # Launch app with --quit-after for clean exit (writes .gcda coverage files)
          build/linux/release/product/Open-Sankore --quit-after=5
          echo "App smoke test completed (clean exit)"
          GCDA_COUNT=$(find . -name "*.gcda" 2>/dev/null | wc -l)
          echo "Found $GCDA_COUNT .gcda files"

      - name: Collect app coverage
        continue-on-error: true
        run: |
          echo "=== Searching for .gcda files ==="
          find . -name "*.gcda" -not -path "*/tests/*" 2>/dev/null | head -20
          GCDA_COUNT=$(find . -name "*.gcda" -not -path "*/tests/*" 2>/dev/null | wc -l)
          echo "Found $GCDA_COUNT app .gcda files"
          if [ "$GCDA_COUNT" -gt 0 ]; then
            lcov --capture --directory . --output-file build/app-coverage.info --no-external || true
            lcov --remove build/app-coverage.info '*/moc_*' '*/qrc_*' '*/tests/*' --output-file build/app-coverage-filtered.info || true
            echo ""
            echo "╔══════════════════════════════════════════════╗"
            echo "║    APP COVERAGE (smoke test startup only)    ║"
            echo "╚══════════════════════════════════════════════╝"
            lcov --summary build/app-coverage-filtered.info 2>&1 || true
            echo ""
          else
            echo "No .gcda files found — app coverage not available"
          fi

      - name: Build unit tests
        continue-on-error: true
        run: |
          cd tests
          qmake6 tests.pro
          # Fix: regenerate moc_predefs.h without aarch64 paths
          g++ -pipe --coverage -O2 -std=gnu++1z -Wall -Wextra -fPIC -dM -E -o build/moc/moc_predefs.h /usr/lib/x86_64-linux-gnu/qt6/mkspecs/features/data/dummy.cpp
          # Patch: remove aarch64 include paths from Makefile
          sed -i 's|-I/usr/include/aarch64-linux-gnu[^ ]*||g' Makefile 2>/dev/null || true
          sed -i 's|-I/usr/lib/gcc/aarch64-linux-gnu[^ ]*||g' Makefile 2>/dev/null || true
          make -j$(nproc) 2>&1 || echo "WARNING: Test build failed - skipping"

      - name: Run unit tests with coverage
        continue-on-error: true
        run: |
          cd tests
          if [ -f build/OpenSankoreTests ]; then
            export QT_QPA_PLATFORM=offscreen
            ./build/OpenSankoreTests -v2 -o build/test-results.txt,txt || true
            echo "=== Test Results ==="
            cat build/test-results.txt 2>/dev/null || echo "No results"
            echo "=== End Results ==="
          else
            echo "Test binary not available - skipping"
          fi

      - name: Generate coverage report
        continue-on-error: true
        run: |
          cd tests
          # Unit test coverage — lines exercised by unit tests
          lcov --capture --directory build/objects --output-file build/test-coverage.info || true
          lcov --remove build/test-coverage.info '/usr/*' '*/moc_*' '*/premoc/*' --output-file build/test-coverage-filtered.info || true
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║       UNIT TEST COVERAGE (tests only)       ║"
          echo "╚══════════════════════════════════════════════╝"
          lcov --summary build/test-coverage-filtered.info 2>&1 || true
          echo ""
          # Merge app + test coverage if both exist
          if [ -f ../build/app-coverage-filtered.info ]; then
            lcov --add-tracefile build/test-coverage-filtered.info --add-tracefile ../build/app-coverage-filtered.info --output-file build/combined-coverage.info 2>/dev/null || cp build/test-coverage-filtered.info build/combined-coverage.info
            echo "╔══════════════════════════════════════════════╗"
            echo "║     COMBINED COVERAGE (App + Unit Tests)    ║"
            echo "╚══════════════════════════════════════════════╝"
            lcov --summary build/combined-coverage.info 2>&1 || true
          else
            cp build/test-coverage-filtered.info build/combined-coverage.info 2>/dev/null || true
          fi
          echo ""
          genhtml build/combined-coverage.info --output-directory build/coverage_html --title "Open-Sankoré Coverage" || true

      - name: Package .deb and .rpm
        if: success()
        run: |
          ./scripts/package-linux.sh amd64

      - name: Upload binary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Open-Sankore-Linux-x64
          path: build/linux/release/product/
          if-no-files-found: warn

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-linux
          path: tests/build/coverage_html/
          if-no-files-found: warn

      - name: Upload .deb package
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: open-sankore-deb-x64
          path: build/packages/*.deb
          if-no-files-found: warn

      - name: Upload .rpm package
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: open-sankore-rpm-x64
          path: build/packages/*.rpm
          if-no-files-found: warn
