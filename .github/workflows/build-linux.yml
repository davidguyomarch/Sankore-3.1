name: Build Linux x64

on:
  push:
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      checks: write
      contents: read

    container:
      image: ubuntu:22.04
      options: --user root

    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
            git \
            build-essential \
            cmake \
            python3 \
            python3-pip \
            libgl1-mesa-dev \
            libglib2.0-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxrender-dev \
            libxcb1-dev \
            libxcb-cursor-dev \
            libxcb-glx0-dev \
            libxcb-keysyms1-dev \
            libxcb-image0-dev \
            libxcb-shm0-dev \
            libxcb-icccm4-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxcb-shape0-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-util-dev \
            libxcb-xinerama0-dev \
            libxcb-xkb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libssl-dev \
            zlib1g-dev \
            libomp-dev \
            pkg-config \
            lcov \
            rpm \
            curl

      - name: Cache Qt 6.8.2
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: /opt/qt
          key: qt-6.8.2-linux-gcc-64-core5compat-multimedia

      - name: Install Qt 6.8.2 via aqtinstall
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          pip3 install aqtinstall
          aqt install-qt linux desktop 6.8.2 linux_gcc_64 -m qt5compat qtmultimedia --outputdir /opt/qt

      - name: Set Qt environment
        run: |
          echo "/opt/qt/6.8.2/gcc_64/bin" >> $GITHUB_PATH
          echo "Qt6_DIR=/opt/qt/6.8.2/gcc_64" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/opt/qt/6.8.2/gcc_64/lib:${LD_LIBRARY_PATH:-}" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache QuaZip
        id: cache-quazip
        uses: actions/cache@v4
        with:
          path: /tmp/quazip-install
          key: quazip-1.4-ubuntu2204-qt6.8.2-v1

      - name: Build QuaZip from source
        if: steps.cache-quazip.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v1.4 https://github.com/stachenov/quazip.git /tmp/quazip-src
          cmake -S /tmp/quazip-src -B /tmp/quazip-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/opt/qt/6.8.2/gcc_64 \
            -DCMAKE_INSTALL_PREFIX=/tmp/quazip-install \
            -DQUAZIP_QT_MAJOR_VERSION=6 \
            -DBUILD_SHARED_LIBS=ON \
            -DQUAZIP_BZIP2=OFF
          cmake --build /tmp/quazip-build -j$(nproc)
          cmake --install /tmp/quazip-build

      - name: Install QuaZip
        run: |
          cp -a /tmp/quazip-install/lib/* /usr/local/lib/ 2>/dev/null || true
          cp -a /tmp/quazip-install/include/* /usr/local/include/ 2>/dev/null || true
          ldconfig

      - name: Generate git version header
        run: |
          echo "#define GIT_COMMIT \"$(git rev-parse --short HEAD)\"" > src/core/git_version.h

      - name: Run qmake
        run: |
          mkdir -p build/linux/release/moc build/linux/release/objects build/linux/release/rcc build/linux/release/ui build/linux/release/product
          qmake Sankore_3.1.pro CONFIG+=no_webengine "QMAKE_CXXFLAGS+=--coverage" "QMAKE_LFLAGS+=--coverage"

      - name: Build
        run: |
          make -j$(nproc)

      - name: List build output
        if: always()
        run: |
          find build -name "Open-Sankore*" 2>/dev/null || echo "No output found"
          ls -la build/linux/release/product/ 2>/dev/null || echo "Product dir not found"

      - name: Smoke test (app coverage)
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          export QT_QPA_PLATFORM=offscreen
          export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
          # Launch app with --quit-after for clean exit (writes .gcda coverage files)
          build/linux/release/product/Open-Sankore --quit-after=8 --smoke-scenario
          echo "App smoke test completed (clean exit)"
          GCDA_COUNT=$(find . -name "*.gcda" 2>/dev/null | wc -l)
          echo "Found $GCDA_COUNT .gcda files"

      - name: Collect app coverage
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          echo "=== Searching for .gcda files ==="
          find . -name "*.gcda" -not -path "*/tests/*" 2>/dev/null | head -20
          GCDA_COUNT=$(find . -name "*.gcda" -not -path "*/tests/*" 2>/dev/null | wc -l)
          echo "Found $GCDA_COUNT app .gcda files"
          if [ "$GCDA_COUNT" -gt 0 ]; then
            lcov --capture --directory . --output-file build/app-coverage.info --no-external || true
            lcov --remove build/app-coverage.info '*/moc_*' '*/qrc_*' '*/tests/*' --output-file build/app-coverage-filtered.info || true
            echo ""
            echo "╔══════════════════════════════════════════════╗"
            echo "║    APP COVERAGE (smoke test startup only)    ║"
            echo "╚══════════════════════════════════════════════╝"
            lcov --summary build/app-coverage-filtered.info 2>&1 || true
            echo ""
          else
            echo "No .gcda files found — app coverage not available"
          fi

      - name: Build unit tests
        run: |
          cd tests
          qmake tests.pro
          # Fix: regenerate moc_predefs.h for x86_64
          g++ -pipe --coverage -O2 -std=gnu++1z -Wall -Wextra -fPIC -dM -E -o build/moc/moc_predefs.h /opt/qt/6.8.2/gcc_64/mkspecs/features/data/dummy.cpp
          # Patch: remove any aarch64 include paths from Makefile
          sed -i 's|-I/usr/include/aarch64-linux-gnu[^ ]*||g' Makefile 2>/dev/null || true
          sed -i 's|-I/usr/lib/gcc/aarch64-linux-gnu[^ ]*||g' Makefile 2>/dev/null || true
          make -j$(nproc)

      - name: Run unit tests with coverage
        shell: bash
        run: |
          set +e
          set +o pipefail
          cd tests
          if [ -f build/OpenSankoreTests ]; then
            export QT_QPA_PLATFORM=offscreen
            ./build/OpenSankoreTests -v2 -o -,txt -o build/test-results.xml,junitxml 2>&1 | tee build/test-results.txt
            TEST_EXIT=${PIPESTATUS[0]}
            echo ""
            echo "=== Tests exit code: $TEST_EXIT ==="
            exit $TEST_EXIT
          else
            echo "ERROR: Test binary not found"
            exit 1
          fi

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: tests/build/test-results.xml
          check_name: Linux Unit Tests
          fail_on_failure: false

      - name: Generate coverage report
        continue-on-error: true
        run: |
          cd tests
          # Unit test coverage — lines exercised by unit tests
          lcov --capture --directory build/objects --output-file build/test-coverage.info || true
          lcov --remove build/test-coverage.info '/usr/*' '*/moc_*' '*/premoc/*' --output-file build/test-coverage-filtered.info || true
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║       UNIT TEST COVERAGE (tests only)       ║"
          echo "╚══════════════════════════════════════════════╝"
          lcov --summary build/test-coverage-filtered.info 2>&1 || true
          echo ""
          # Merge app + test coverage if both exist
          if [ -f ../build/app-coverage-filtered.info ]; then
            lcov --add-tracefile build/test-coverage-filtered.info --add-tracefile ../build/app-coverage-filtered.info --output-file build/combined-coverage.info 2>/dev/null || cp build/test-coverage-filtered.info build/combined-coverage.info
            echo "╔══════════════════════════════════════════════╗"
            echo "║     COMBINED COVERAGE (App + Unit Tests)    ║"
            echo "╚══════════════════════════════════════════════╝"
            lcov --summary build/combined-coverage.info 2>&1 || true
          else
            cp build/test-coverage-filtered.info build/combined-coverage.info 2>/dev/null || true
          fi
          echo ""
          genhtml build/combined-coverage.info --output-directory build/coverage_html --title "Open-Sankoré Coverage" || true

      - name: Coverage summary
        if: always()
        continue-on-error: true
        run: |
          cd tests
          # Extract metrics
          APP_LINES=$(lcov --summary ../build/app-coverage-filtered.info 2>&1 | grep 'lines' | grep -oP '[\d.]+(?=%)' || echo "N/A")
          APP_FUNCS=$(lcov --summary ../build/app-coverage-filtered.info 2>&1 | grep 'functions' | grep -oP '[\d.]+(?=%)' || echo "N/A")
          TEST_LINES=$(lcov --summary build/test-coverage-filtered.info 2>&1 | grep 'lines' | grep -oP '[\d.]+(?=%)' || echo "N/A")
          TEST_FUNCS=$(lcov --summary build/test-coverage-filtered.info 2>&1 | grep 'functions' | grep -oP '[\d.]+(?=%)' || echo "N/A")
          COMBINED_LINES=$(lcov --summary build/combined-coverage.info 2>&1 | grep 'lines' | grep -oP '[\d.]+(?=%)' || echo "N/A")
          COMBINED_FUNCS=$(lcov --summary build/combined-coverage.info 2>&1 | grep 'functions' | grep -oP '[\d.]+(?=%)' || echo "N/A")
          COMBINED_LINES_DETAIL=$(lcov --summary build/combined-coverage.info 2>&1 | grep 'lines' | grep -oP '\(\d+ of \d+' | tr -d '(' || echo "")
          # Write to job summary
          echo "## 📊 Code Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | App (smoke test) | Unit Tests | Combined |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----------------|------------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lines | ${APP_LINES}% | ${TEST_LINES}% | **${COMBINED_LINES}%** ${COMBINED_LINES_DETAIL} |" >> $GITHUB_STEP_SUMMARY
          echo "| Functions | ${APP_FUNCS}% | ${TEST_FUNCS}% | **${COMBINED_FUNCS}%** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Coverage report HTML available as artifact: \`coverage-report-linux\`" >> $GITHUB_STEP_SUMMARY

      - name: Update coverage badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        continue-on-error: true
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          cd tests
          COV_PCT=$(lcov --summary build/combined-coverage.info 2>&1 | grep 'lines' | grep -oP '[\d.]+(?=%)' || echo "0")
          echo "Coverage: ${COV_PCT}%"
          COV_INT=${COV_PCT%.*}
          if [ "$COV_INT" -ge 80 ]; then COLOR="brightgreen"
          elif [ "$COV_INT" -ge 60 ]; then COLOR="green"
          elif [ "$COV_INT" -ge 40 ]; then COLOR="yellowgreen"
          elif [ "$COV_INT" -ge 20 ]; then COLOR="yellow"
          else COLOR="red"; fi
          echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${COV_PCT}%\",\"color\":\"${COLOR}\"}" > /tmp/coverage.json
          cat /tmp/coverage.json
          python3 ../scripts/update_coverage_badge.py /tmp/coverage.json

      - name: Package .deb and .rpm
        if: success() && (github.event_name == 'pull_request' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        run: |
          ./scripts/package-linux.sh amd64

      - name: Upload binary artifact
        if: always() && (github.event_name == 'pull_request' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: Open-Sankore-Linux-x64
          path: build/linux/release/product/
          if-no-files-found: warn

      - name: Upload coverage report
        if: always() && (github.event_name == 'pull_request' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-linux
          path: tests/build/coverage_html/
          if-no-files-found: warn

      - name: Upload .deb package
        if: success() && (github.event_name == 'pull_request' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: open-sankore-deb-x64
          path: build/packages/*.deb
          if-no-files-found: warn

      - name: Upload .rpm package
        if: success() && (github.event_name == 'pull_request' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: open-sankore-rpm-x64
          path: build/packages/*.rpm
          if-no-files-found: warn
