name: Build Linux x64

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Qt 6 via aqtinstall
        run: |
          pip install aqtinstall
          aqt install-qt linux desktop 6.8.2 linux_gcc_64 -m qt5compat qtmultimedia --outputdir /opt/Qt
          echo "/opt/Qt/6.8.2/gcc_64/bin" >> $GITHUB_PATH
          echo "Qt6_DIR=/opt/Qt/6.8.2/gcc_64" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/opt/Qt/6.8.2/gcc_64/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgl1-mesa-dev \
            libssl-dev \
            zlib1g-dev \
            libx11-dev \
            libomp-dev \
            libxkbcommon-dev \
            libfontconfig1-dev \
            libpulse-dev \
            pkg-config \
            lcov

      - name: Build QuaZip from source
        run: |
          git clone --depth 1 --branch v1.4 https://github.com/stachenov/quazip.git /tmp/quazip-src
          cmake -S /tmp/quazip-src -B /tmp/quazip-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/opt/Qt/6.8.2/gcc_64 \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DQUAZIP_QT_MAJOR_VERSION=6 \
            -DBUILD_SHARED_LIBS=ON \
            -DQUAZIP_BZIP2=OFF
          cmake --build /tmp/quazip-build -j$(nproc)
          sudo cmake --install /tmp/quazip-build

      - name: Generate git version header
        run: |
          echo "#define GIT_COMMIT \"$(git rev-parse --short HEAD)\"" > src/core/git_version.h

      - name: Run qmake
        run: |
          mkdir -p build/linux/release/moc build/linux/release/objects build/linux/release/rcc build/linux/release/ui build/linux/release/product
          qmake Sankore_3.1.pro CONFIG+=no_webengine
          # Fix: aqtinstall moc includes wrong aarch64 system paths — patch them out
          find . -name "Makefile*" -exec sed -i 's|-I/usr/include/aarch64-linux-gnu[^ ]*||g' {} \;
          find . -name "Makefile*" -exec sed -i 's|-I/usr/lib/gcc/aarch64-linux-gnu[^ ]*||g' {} \;

      - name: Build
        run: |
          make -j$(nproc)

      - name: List build output
        if: always()
        run: |
          find build -name "Open-Sankore*" -o -name "*.so" 2>/dev/null || echo "No output found"
          ls -la build/linux/release/product/ 2>/dev/null || echo "Product dir not found"

      - name: Build unit tests
        run: |
          cd tests
          qmake tests.pro
          make -j$(nproc)

      - name: Run unit tests with coverage
        run: |
          cd tests
          export QT_QPA_PLATFORM=offscreen
          ./build/OpenSankoreTests -v2 -o build/test-results.txt,txt || true
          echo "=== Test Results ==="
          cat build/test-results.txt 2>/dev/null || echo "No test results"
          echo "=== End Results ==="

      - name: Generate coverage report
        run: |
          cd tests
          # Capture coverage data
          lcov --capture --directory build/objects --output-file build/coverage.info || true
          # Filter out system/Qt headers — keep only our sources
          lcov --remove build/coverage.info '/usr/*' '*/Qt6/*' '*/moc_*' --output-file build/coverage-filtered.info || true
          # Generate summary
          echo "=== Coverage Summary ==="
          lcov --summary build/coverage-filtered.info 2>&1 || true
          # Generate HTML report
          genhtml build/coverage-filtered.info --output-directory build/coverage_html --title "Open-Sankoré Tests" || true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-linux
          path: tests/build/coverage_html/
          if-no-files-found: warn

      - name: Package .deb and .rpm
        if: success()
        run: |
          sudo apt-get install -y rpm
          ./scripts/package-linux.sh amd64

      - name: Upload binary artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Open-Sankore-Linux-x64
          path: build/linux/release/product/
          if-no-files-found: warn

      - name: Upload .deb package
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: open-sankore-deb-x64
          path: build/packages/*.deb
          if-no-files-found: warn

      - name: Upload .rpm package
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: open-sankore-rpm-x64
          path: build/packages/*.rpm
          if-no-files-found: warn
