name: Build Linux x64

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    container:
      image: ubuntu:22.04
      options: --user root

    steps:
      - name: Install git and dependencies
        run: |
          apt-get update
          apt-get install -y \
            git \
            build-essential \
            cmake \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-declarative-dev \
            libqt6svg6-dev \
            qt6-multimedia-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            qt6-l10n-tools \
            libqt6opengl6-dev \
            libqt6core5compat6-dev \
            libgl1-mesa-dev \
            libssl-dev \
            zlib1g-dev \
            libx11-dev \
            libomp-dev \
            pkg-config \
            lcov \
            rpm

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build QuaZip from source
        run: |
          git clone --depth 1 --branch v1.4 https://github.com/stachenov/quazip.git /tmp/quazip-src
          cmake -S /tmp/quazip-src -B /tmp/quazip-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DQUAZIP_QT_MAJOR_VERSION=6 \
            -DBUILD_SHARED_LIBS=ON \
            -DQUAZIP_BZIP2=OFF
          cmake --build /tmp/quazip-build -j$(nproc)
          cmake --install /tmp/quazip-build
          ldconfig

      - name: Generate git version header
        run: |
          echo "#define GIT_COMMIT \"$(git rev-parse --short HEAD)\"" > src/core/git_version.h

      - name: Run qmake
        run: |
          mkdir -p build/linux/release/moc build/linux/release/objects build/linux/release/rcc build/linux/release/ui build/linux/release/product
          qmake6 Sankore_3.1.pro CONFIG+=no_webengine

      - name: Build
        run: |
          make -j$(nproc)

      - name: List build output
        if: always()
        run: |
          find build -name "Open-Sankore*" 2>/dev/null || echo "No output found"
          ls -la build/linux/release/product/ 2>/dev/null || echo "Product dir not found"

      - name: Build unit tests
        continue-on-error: true
        run: |
          cd tests
          qmake6 tests.pro
          make -j$(nproc) 2>&1 || echo "WARNING: Test build failed (moc issue) - skipping"

      - name: Run unit tests with coverage
        continue-on-error: true
        run: |
          cd tests
          if [ -f build/OpenSankoreTests ]; then
            export QT_QPA_PLATFORM=offscreen
            ./build/OpenSankoreTests -v2 -o build/test-results.txt,txt || true
            echo "=== Test Results ==="
            cat build/test-results.txt 2>/dev/null || echo "No results"
            echo "=== End Results ==="
          else
            echo "Test binary not available - skipping"
          fi

      - name: Generate coverage report
        continue-on-error: true
        run: |
          cd tests
          lcov --capture --directory build/objects --output-file build/coverage.info || true
          lcov --remove build/coverage.info '/usr/*' '*/Qt6/*' '*/moc_*' --output-file build/coverage-filtered.info || true
          echo "=== Coverage Summary ==="
          lcov --summary build/coverage-filtered.info 2>&1 || true
          genhtml build/coverage-filtered.info --output-directory build/coverage_html --title "Open-Sankoré Tests" || true

      - name: Package .deb and .rpm
        if: success()
        run: |
          ./scripts/package-linux.sh amd64

      - name: Upload binary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Open-Sankore-Linux-x64
          path: build/linux/release/product/
          if-no-files-found: warn

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-linux
          path: tests/build/coverage_html/
          if-no-files-found: warn

      - name: Upload .deb package
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: open-sankore-deb-x64
          path: build/packages/*.deb
          if-no-files-found: warn

      - name: Upload .rpm package
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: open-sankore-rpm-x64
          path: build/packages/*.rpm
          if-no-files-found: warn
