name: Build Windows

on:
  push:
    branches: [ master, main, 'atx-result-*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false

      - name: Install Qt 6 via aqtinstall directly
        shell: pwsh
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop 6.7.2 win64_msvc2019_64 -m qtmultimedia qt5compat --outputdir C:\Qt
          echo "C:\Qt\6.7.2\msvc2019_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "Qt6_DIR=C:\Qt\6.7.2\msvc2019_64" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Create build directories
        shell: cmd
        run: |
          mkdir build\win32\release\moc 2>NUL
          mkdir build\win32\release\objects 2>NUL
          mkdir build\win32\release\rcc 2>NUL
          mkdir build\win32\release\ui 2>NUL
          mkdir build\win32\release\product 2>NUL

      - name: Run qmake
        shell: cmd
        run: |
          for /f "tokens=*" %%i in ('cl 2^>^&1 ^| findstr /C:"Version"') do set CL_VERSION=%%i
          echo Compiler: %CL_VERSION%
          echo QMAKE_MSC_VER = 1941 >> C:\Qt\6.7.2\msvc2019_64\mkspecs\common\msvc-version.conf
          qmake Sankore_3.1.pro

      - name: Build
        shell: cmd
        run: nmake 2>&1 | tee build_output.txt

      - name: Upload exe
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Open-Sankore-Windows-x64
          path: build/win32/release/product/

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.txt
