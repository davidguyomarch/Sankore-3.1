name: Build Windows

on:
  push:
    branches: [ master, main, 'atx-result-*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false

      - name: Install Qt 6 via aqtinstall
        shell: pwsh
        run: |
          pip install aqtinstall
          aqt list-qt windows desktop
          aqt install-qt windows desktop 6.8.3 win64_msvc2022_64 -m qt5compat qtmultimedia qtwebengine --outputdir C:\Qt
          echo "C:\Qt\6.8.3\msvc2022_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "Qt6_DIR=C:\Qt\6.8.3\msvc2022_64" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install OpenSSL via vcpkg
        shell: pwsh
        run: |
          vcpkg install openssl:x64-windows
          # Verify
          if (!(Test-Path "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\include\openssl\evp.h")) {
            Write-Error "OpenSSL headers not found!"
            exit 1
          }
          Write-Host "=== vcpkg x64-windows lib ==="
          Get-ChildItem "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\lib\*.lib" | ForEach-Object { Write-Host $_.Name }
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build zlib from source
        shell: cmd
        run: |
          git clone --depth 1 --branch v1.3.1 https://github.com/madler/zlib.git C:\zlib-src
          mkdir C:\zlib-build
          cmake -S C:\zlib-src -B C:\zlib-build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=C:\zlib
          cmake --build C:\zlib-build
          cmake --install C:\zlib-build
          dir C:\zlib\lib

      - name: Build QuaZip from source
        shell: cmd
        run: |
          git clone --depth 1 --branch v1.4 https://github.com/stachenov/quazip.git C:\quazip-src
          mkdir C:\quazip-build
          cmake -S C:\quazip-src -B C:\quazip-build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=C:\Qt\6.8.3\msvc2022_64 -DCMAKE_INSTALL_PREFIX=C:\quazip -DQUAZIP_QT_MAJOR_VERSION=6 -DBUILD_SHARED_LIBS=OFF -DZLIB_LIBRARY=C:\zlib\lib\zlibstatic.lib -DZLIB_INCLUDE_DIR=C:\zlib\include -DQUAZIP_BZIP2=OFF
          cmake --build C:\quazip-build
          cmake --install C:\quazip-build
          dir C:\quazip\lib

      - name: Create build directories
        shell: cmd
        run: |
          mkdir build\win32\release\moc 2>NUL
          mkdir build\win32\release\objects 2>NUL
          mkdir build\win32\release\rcc 2>NUL
          mkdir build\win32\release\ui 2>NUL
          mkdir build\win32\release\product 2>NUL

      - name: Run qmake
        shell: cmd
        run: |
          set VCPKG_ROOT=%VCPKG_INSTALLATION_ROOT%
          for /f %%i in ('git rev-parse --short HEAD') do echo #define GIT_COMMIT "%%i" > src\core\git_version.h
          qmake Sankore_3.1.pro

      - name: Build
        shell: cmd
        run: |
          set VCPKG_ROOT=%VCPKG_INSTALLATION_ROOT%
          nmake release

      - name: List build output
        if: always()
        shell: pwsh
        run: |
          Write-Host "=== Looking for exe files ==="
          Get-ChildItem -Recurse -Filter "*.exe" -Path build -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
          Write-Host "=== Looking for product dir ==="
          Get-ChildItem -Recurse -Path build -ErrorAction SilentlyContinue | Where-Object { $_.DirectoryName -match "product" } | ForEach-Object { Write-Host $_.FullName }

      - name: Build and run unit tests
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT
          cd tests
          qmake tests.pro
          nmake
          Write-Host "=== Looking for test exe ==="
          Get-ChildItem -Recurse -Filter "OpenSankoreTests.exe" | ForEach-Object { Write-Host $_.FullName }
          $exe = Get-ChildItem -Recurse -Filter "OpenSankoreTests.exe" | Select-Object -First 1
          if (-not $exe) {
            Write-Error "Test executable not found!"
            exit 1
          }
          Write-Host "=== Running unit tests ==="
          & $exe.FullName
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Unit tests FAILED with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          Write-Host "All unit tests passed!"

      - name: Deploy Qt DLLs
        if: success()
        shell: cmd
        run: |
          windeployqt --release --no-translations --no-system-d3d-compiler --no-opengl-sw build\win32\release\product\Open-Sankore.exe
          copy C:\zlib\bin\zlib.dll build\win32\release\product\
          copy C:\vcpkg\installed\x64-windows\bin\libssl-3-x64.dll build\win32\release\product\
          copy C:\vcpkg\installed\x64-windows\bin\libcrypto-3-x64.dll build\win32\release\product\
          dir build\win32\release\product\

      - name: Smoke test (launch and verify no crash)
        if: success()
        shell: pwsh
        run: |
          $exe = "build\win32\release\product\Open-Sankore.exe"
          Write-Host "=== Smoke Test: launching $exe ==="
          
          # Launch the app in background
          $proc = Start-Process -FilePath $exe -PassThru -WindowStyle Hidden
          Write-Host "Process started with PID $($proc.Id)"
          
          # Wait 8 seconds — enough for init + first paint cycle
          Start-Sleep -Seconds 8
          
          # Check if still running (no crash)
          if ($proc.HasExited) {
            Write-Host "FAIL: Process exited with code $($proc.ExitCode)"
            # Check for startup.log crash info
            $logPath = "build\win32\release\product\startup.log"
            if (Test-Path $logPath) {
              Write-Host "=== startup.log ==="
              Get-Content $logPath
            }
            exit 1
          }
          
          Write-Host "PASS: Process is still running after 8 seconds (PID $($proc.Id))"
          
          # Kill gracefully
          $proc | Stop-Process -Force
          Write-Host "Process terminated. Smoke test passed!"

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Open-Sankore-Windows-x64
          path: build/win32/release/product/
          if-no-files-found: warn
