name: Build Windows

on:
  push:
    branches: [ master, main, 'atx-result-*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtmultimedia qtsvg qt5compat'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Create build directories
        shell: cmd
        run: |
          mkdir build\win32\release\moc
          mkdir build\win32\release\objects
          mkdir build\win32\release\rcc
          mkdir build\win32\release\ui
          mkdir build\win32\release\product

      - name: Run qmake
        shell: cmd
        run: qmake Sankore_3.1.pro

      - name: Build
        shell: cmd
        run: nmake

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Open-Sankore-Windows-x64
          path: build/win32/release/product/
          if-no-files-found: warn
