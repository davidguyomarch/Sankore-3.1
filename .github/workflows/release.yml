name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt 6 via aqtinstall
        shell: pwsh
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop 6.8.3 win64_msvc2022_64 -m qt5compat qtmultimedia --outputdir C:\Qt
          echo "C:\Qt\6.8.3\msvc2022_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install OpenSSL via vcpkg
        shell: pwsh
        run: |
          vcpkg install openssl:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build zlib
        shell: cmd
        run: |
          git clone --depth 1 --branch v1.3.1 https://github.com/madler/zlib.git C:\zlib-src
          cmake -S C:\zlib-src -B C:\zlib-build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=C:\zlib
          cmake --build C:\zlib-build
          cmake --install C:\zlib-build

      - name: Build QuaZip
        shell: cmd
        run: |
          git clone --depth 1 --branch v1.4 https://github.com/stachenov/quazip.git C:\quazip-src
          cmake -S C:\quazip-src -B C:\quazip-build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=C:\Qt\6.8.3\msvc2022_64 -DCMAKE_INSTALL_PREFIX=C:\quazip -DQUAZIP_QT_MAJOR_VERSION=6 -DBUILD_SHARED_LIBS=OFF -DZLIB_LIBRARY=C:\zlib\lib\zlibstatic.lib -DZLIB_INCLUDE_DIR=C:\zlib\include -DQUAZIP_BZIP2=OFF
          cmake --build C:\quazip-build
          cmake --install C:\quazip-build

      - name: Build
        shell: cmd
        run: |
          set VCPKG_ROOT=%VCPKG_INSTALLATION_ROOT%
          mkdir build\win32\release\moc build\win32\release\objects build\win32\release\rcc build\win32\release\ui build\win32\release\product 2>NUL
          for /f %%i in ('git rev-parse --short HEAD') do echo #define GIT_COMMIT "%%i" > src\core\git_version.h
          qmake Sankore_3.1.pro CONFIG+=no_webengine
          nmake release

      - name: Deploy
        shell: cmd
        run: |
          windeployqt --release --no-translations build\win32\release\product\Open-Sankore.exe
          copy C:\zlib\bin\zlib.dll build\win32\release\product\
          copy C:\vcpkg\installed\x64-windows\bin\libssl-3-x64.dll build\win32\release\product\
          copy C:\vcpkg\installed\x64-windows\bin\libcrypto-3-x64.dll build\win32\release\product\

      - name: Create Windows zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          Compress-Archive -Path build\win32\release\product\* -DestinationPath "Open-Sankore-${version}-windows-x64.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: Open-Sankore-*-windows-x64.zip

  build-linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential qt6-base-dev qt6-base-dev-tools \
            libqt6svg6-dev qt6-svg-dev qt6-multimedia-dev \
            qt6-tools-dev qt6-tools-dev-tools qt6-l10n-tools \
            libqt6opengl6-dev libgl1-mesa-dev \
            libssl-dev zlib1g-dev libx11-dev \
            libquazip1-qt6-dev libomp-dev \
            qmake6 pkg-config rpm

      - name: Build
        run: |
          echo "#define GIT_COMMIT \"$(git rev-parse --short HEAD)\"" > src/core/git_version.h
          mkdir -p build/linux/release/{moc,objects,rcc,ui,product}
          qmake6 Sankore_3.1.pro CONFIG+=no_webengine
          make -j$(nproc)

      - name: Package
        run: |
          ./scripts/package-linux.sh amd64

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            build/packages/*.deb
            build/packages/*.rpm

  publish:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List artifacts
        run: find . -type f -name "*.zip" -o -name "*.deb" -o -name "*.rpm" | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            windows-release/*.zip
            linux-release/*.deb
            linux-release/*.rpm
